services:
  postgres:
    image: 'postgres:17-alpine'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-leaderboard_db}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - leaderboard-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-leaderboard_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: 'mysql:8.4'
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-leaderboard_db}
      MYSQL_USER: ${MYSQL_USER:-leaderboard}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-leaderboard}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - leaderboard-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${MYSQL_USER:-leaderboard} -p${MYSQL_PASSWORD:-leaderboard}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: 'redis:7-alpine'
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - leaderboard-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  leaderboard-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/leaderboard_db}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_CACHE_TYPE: ${SPRING_CACHE_TYPE:-redis}
      SPRING_CACHE_REDIS_TTL: ${SPRING_CACHE_REDIS_TTL:-10m}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      API_SECURITY_TOKEN_SECRET: ${API_SECURITY_TOKEN_SECRET:-local-development-secret-change-me}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:*}
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:$${PORT:-8080}/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - leaderboard-network

volumes:
  postgres_data:
  mysql_data:
  redis_data:

networks:
  leaderboard-network:
    driver: bridge
