# Local development database defaults
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/leaderboard_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# Local development keeps schema updates convenient.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}

# Local/test profiles may use a fallback secret. Production must not.
api.security.token.secret=${API_SECURITY_TOKEN_SECRET:local-development-secret-change-me}

cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:*}
